# Defaults do agente (SEM segredos). Quando usado, o bot mostra no resumo.
# Regra operacional do usuário (confirmada):
#   conta 1 / conta um / final 85 = contaBancariaId 5  (padrão quando não informa)
#   conta 2 / conta dois / final 97 = contaBancariaId 6
# (os ultimos4 reais da API podem diferir; vale a regra de uso do bot acima.)

obraPadraoId: 4
categoriaPadraoId: 15        # usada quando não informada/inferida (Materiais de Construção)
formaPagamentoPadrao: pix
# fornecedor "Outros" p/ compras sem fornecedor reconhecido (ajustar depois no web).
# ATENÇÃO: é id de FORNECEDOR (domínio diferente de contaBancariaId).
fornecedorOutrosId: 6        # fornecedor "Outros" (NÃO confundir com conta bancária 6)

# ── Conta bancária de saída ──
contaBancariaPadraoId: 5     # sem informar conta → conta final 85
contasBancarias:
  conta1: 5
  contaUm: 5
  final85: 5
  "85": 5
  conta2: 6
  contaDois: 6
  final97: 6
  "97": 6

# categoria provável por palavra-chave (palavra -> categoriaId)
categorias:
  areia: 15
  material: 15
  materiais: 15
  ferramenta: 15
  ferramentas: 15
  construcao: 15
  construção: 15
  cimento: 15
  brita: 15
  fio: 15
  cabo: 15
  tubo: 15

rh:
  destinoPadrao: pagamento   # vale | pagamento
