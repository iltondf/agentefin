# Deploy direto na VPS (Docker Compose) — SEM Easypanel, SEM porta, SEM proxy/SSL.
# O bot usa polling do Telegram → apenas conexões de SAÍDA (Telegram + API BRGlobal).
services:
  agentefin:
    build: .
    container_name: agentefin
    restart: unless-stopped
    env_file: .env
    # Sem `ports`: nada é exposto; nenhuma requisição externa entra.
    volumes:
      # Persistência dos RASCUNHOS/pendências (SQLite em /app/data). Necessário p/
      # os rascunhos sobreviverem a redeploy. Logs continuam em stdout.
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
